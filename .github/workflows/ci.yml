name: CI

# Verifies the package on every push/PR:
#   - js:      lint + typecheck + unit tests + build (the fully-reviewable layer)
#   - android: COMPILES the Kotlin module + JNI + the C++/JSI engine (NDK)
#   - ios:     COMPILES the Obj-C module + the C++/JSI engine (always-on on iOS)
#
# The library has no standalone gradle/xcode project (it builds inside a host
# RN app, by design). So the native jobs generate a throwaway RN app, install
# this package into it, and build that app — which is the only way to compile
# the native sources against the real React Native / JSI toolchain.
#
# NOTE: RN app scaffolding is version-sensitive. RN_VERSION is pinned to match
# the package's dev React Native; bump it together with devDependencies.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  RN_VERSION: "0.81.0"
  NODE_VERSION: "20"

jobs:
  js:
    name: JS (lint · typecheck · test · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          # no `cache: npm` — there is no committed package-lock.json yet
      - run: npm install --no-audit --no-fund
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test -- --ci
      - name: Build
        # lib/ is a gitignored build artifact, regenerated by `prepack` on publish;
        # this step just proves src/ compiles cleanly with the build config.
        run: npm run build

  android:
    name: Android native build (Kotlin + JNI + C++/JSI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: pkg
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Install NDK + CMake (needed by the opt-in C++/JSI engine)
        # sdkmanager downloads are occasionally corrupt ("Error on ZipFile unknown
        # archive"); retry with backoff so a transient failure doesn't red the build.
        run: |
          sdk() { sdkmanager "ndk;26.1.10909125" "cmake;3.22.1"; }
          sdk || { sleep 15; sdk; } || { sleep 30; sdk; }
      - name: Pack the library
        id: pack
        working-directory: pkg
        run: |
          npm install --no-audit --no-fund
          npm run build
          TARBALL="$(npm pack | tail -1)"
          echo "tarball=$PWD/$TARBALL" >> "$GITHUB_OUTPUT"
      - name: Scaffold a host RN app
        run: |
          npx --yes @react-native-community/cli@latest init HostApp \
            --version "${{ env.RN_VERSION }}" --skip-git-init --pm npm
      - name: Install the library + enable the C++/JSI engine
        working-directory: HostApp
        run: |
          npm install "${{ steps.pack.outputs.tarball }}"
          echo "okintEnableJSI=true" >> android/gradle.properties
      - name: Compile the app (compiles the library's Kotlin + JNI + C++)
        working-directory: HostApp/android
        run: ./gradlew assembleDebug --no-daemon

  ios:
    name: iOS native build (Obj-C + C++/JSI)
    # macos-15 ships Xcode 16.x — RN 0.81's Podfile requires it ("Please upgrade XCode").
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          path: pkg
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Pack the library
        id: pack
        working-directory: pkg
        run: |
          npm install --no-audit --no-fund
          npm run build
          TARBALL="$(npm pack | tail -1)"
          echo "tarball=$PWD/$TARBALL" >> "$GITHUB_OUTPUT"
      - name: Scaffold a host RN app
        run: |
          npx --yes @react-native-community/cli@latest init HostApp \
            --version "${{ env.RN_VERSION }}" --skip-git-init --pm npm
      - name: Install the library
        working-directory: HostApp
        run: npm install "${{ steps.pack.outputs.tarball }}"
      - name: pod install
        working-directory: HostApp/ios
        run: pod install
      - name: Compile the app (compiles the library's Obj-C + C++/JSI)
        working-directory: HostApp/ios
        run: |
          set -o pipefail
          xcodebuild \
            -workspace HostApp.xcworkspace \
            -scheme HostApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
