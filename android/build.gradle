// okint-rn-storage — Android library build.
// Relies on the host app's React Native Gradle setup for the Android Gradle
// Plugin + Kotlin plugin classpath (RN 0.73+ convention), so no buildscript
// block is needed here. Versions fall back to sensible defaults if the root
// project doesn't expose them.

apply plugin: "com.android.library"
apply plugin: "org.jetbrains.kotlin.android"

def safeExtGet(prop, fallback) {
  rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}

// The C++/JSI fast-path engine (createJSIStorage) needs the NDK + CMake + the
// ReactAndroid::jsi prefab. It is OPT-IN: the default build ships pure
// Kotlin/Java (secure/encrypted/sqlite/async + the bridge-based `fast` sync
// store all work without it). Enable with -PokintEnableJSI=true (or
// okintEnableJSI=true in gradle.properties). When disabled, System.loadLibrary
// is a no-op (caught) and createJSIStorage reports the engine unavailable.
def enableJSI = project.hasProperty("okintEnableJSI") &&
  project.property("okintEnableJSI").toString().toBoolean()

android {
  namespace "com.okint.rnstorage"
  compileSdkVersion safeExtGet("compileSdkVersion", 35)

  defaultConfig {
    minSdkVersion safeExtGet("minSdkVersion", 24)
    targetSdkVersion safeExtGet("targetSdkVersion", 35)
    consumerProguardFiles "proguard-rules.pro"
    if (enableJSI) {
      externalNativeBuild {
        cmake {
          cppFlags "-O2", "-frtti", "-fexceptions", "-std=c++17"
          // React Native's prefab libs (jsi / hermestooling) are built against
          // the shared STL; the consuming CMake build MUST match or prefab
          // resolution fails ("static STL but library requires a shared STL").
          arguments "-DANDROID_STL=c++_shared"
        }
      }
    }
  }

  if (enableJSI) {
    // Consume React Native's prefab (JSI) for the C++ fast-path engine.
    buildFeatures {
      prefab true
    }

    externalNativeBuild {
      cmake {
        path "src/main/jni/CMakeLists.txt"
      }
    }
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  kotlinOptions {
    jvmTarget = "17"
  }
}

repositories {
  mavenCentral()
  google()
}

dependencies {
  // Version supplied by the host app's React Native Gradle Plugin — do NOT pin.
  // No other dependencies: all crypto is platform javax.crypto + AndroidKeystore.
  implementation "com.facebook.react:react-android"
}
